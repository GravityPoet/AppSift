name: AppSift
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
options:
  bundleIdPrefix: com.gravitypoet
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: "NO"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: "Manual"
    CODE_SIGN_ENTITLEMENTS: "AppSift/AppSift.entitlements"
    INFOPLIST_FILE: "AppSift/Info.plist"
    PRODUCT_BUNDLE_IDENTIFIER: "com.gravitypoet.appsift"
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "5"
    GENERATE_INFOPLIST_FILE: "NO"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    COMBINE_HIDPI_IMAGES: "YES"

targets:
  AppSift:
    type: application
    platform: macOS
    sources:
      - AppSift
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: AppSift
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

  AppSiftTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AppSiftTests
    dependencies:
      - target: AppSift
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"

schemes:
  AppSift:
    build:
      targets:
        AppSift: all
        AppSiftTests: [test]
    test:
      targets:
        - name: AppSiftTests
